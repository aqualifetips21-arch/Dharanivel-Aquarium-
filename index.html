<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqua Life Tips</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
    color: white;
    text-align: center;
}

.header {
    padding: 40px 20px;
}

.logo {
    width: 140px;
    border-radius: 50%;
    border: 3px solid #fff;
}

h1 {
    margin: 10px 0 5px;
}

.insta {
    color: #ff4d6d;
    text-decoration: none;
    font-weight: bold;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #ff4d6d; }
    to { text-shadow: 0 0 20px #ff4d6d; }
}

.btn {
    display: inline-block;
    margin: 20px;
    padding: 12px 25px;
    background: #ff4d6d;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff758f;
    transform: scale(1.05);
}

.section {
    margin: 40px 20px;
}

textarea {
    width: 100%;
    max-width: 600px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-family: monospace;
    font-size: 14px;
    resize: none;
}

.copy-status {
    margin-top: 10px;
    color: #00e6a8;
    font-weight: bold;
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <!-- YOUR IMAGE -->
    <img src="myphoto.png.jpeg" class="logo">

    <h1>DHARANIVEL</h1>

    <!-- YOUR INSTAGRAM -->
    <a href="https://instagram.com/aqualifetips" target="_blank" class="insta">
        @aqualifetips
    </a>
</div>

<!-- BUTTON -->
<a href="https://instagram.com/aqualifetips" target="_blank" class="btn">
    🎬 My Videos
</a>

<div class="section">
    <h2>📚 Material</h2>

    <h3>CODE</h3>

    <textarea id="codeText" rows="10" readonly>
YOUR CODE HERE Click to COPY
    </textarea>

    <br>

    <button class="btn" onclick="copyCode()">COPY</button>
    <div class="copy-status" id="copyStatus">Copied ✔</div>
</div>

<script>
function copyCode() {
    let code = document.getElementById("codeText").value;
    navigator.clipboard.writeText(code);

    let status = document.getElementById("copyStatus");
    status.style.display = "block";

    setTimeout(() => {
        status.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
