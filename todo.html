<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  width: 100%;
  max-width: 500px;
  padding: 30px;
}

h1 {
  color: #333;
  text-align: center;
  margin-bottom: 30px;
  font-size: 2em;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.input-container {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
}

#todoInput {
  flex: 1;
  padding: 12px 15px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1em;
  transition: border-color 0.3s;
}

#todoInput:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
}

#addBtn {
  padding: 12px 25px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

#addBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}

#addBtn:active {
  transform: translateY(0);
}

.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.filter-btn {
  padding: 8px 15px;
  border: 2px solid #e0e0e0;
  background: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.3s;
  font-weight: 500;
}

.filter-btn.active {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: transparent;
}

.filter-btn:hover {
  border-color: #667eea;
}

#todoList {
  list-style: none;
  max-height: 500px;
  overflow-y: auto;
}

.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 8px;
  margin-bottom: 10px;
  transition: all 0.3s;
  border-left: 4px solid #667eea;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.todo-item:hover {
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
  transform: translateX(5px);
}

.todo-item.completed {
  opacity: 0.6;
  border-left-color: #4caf50;
}

.todo-item.completed .todo-text {
  text-decoration: line-through;
  color: #999;
}

.checkbox {
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: #667eea;
}

.todo-text {
  flex: 1;
  color: #333;
  font-size: 1em;
  word-break: break-word;
}

.todo-priority {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.75em;
  font-weight: 600;
  text-transform: uppercase;
}

.priority-high {
  background: #ffcdd2;
  color: #c62828;
}

.priority-medium {
  background: #fff3cd;
  color: #856404;
}

.priority-low {
  background: #d4edda;
  color: #155724;
}

.todo-actions {
  display: flex;
  gap: 8px;
}

.edit-btn, .delete-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.85em;
  font-weight: 600;
  transition: all 0.2s;
}

.edit-btn {
  background: #2196F3;
  color: white;
}

.edit-btn:hover {
  background: #1976D2;
  transform: scale(1.05);
}

.delete-btn {
  background: #f44336;
  color: white;
}

.delete-btn:hover {
  background: #d32f2f;
  transform: scale(1.05);
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 8px;
  font-size: 0.9em;
}

.stat {
  text-align: center;
}

.stat-number {
  font-size: 1.5em;
  font-weight: bold;
  color: #667eea;
  display: block;
}

.stat-label {
  color: #999;
  font-size: 0.85em;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #999;
}

.empty-state-icon {
  font-size: 3em;
  margin-bottom: 10px;
}

#clearBtn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #f44336;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

#clearBtn:hover {
  background: #d32f2f;
  box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
}

.priority-selector {
  padding: 8px 12px;
  border: 2px solid #e0e0e0;
  border-radius: 6px;
  font-size: 0.9em;
  cursor: pointer;
  transition: border-color 0.3s;
}

.priority-selector:focus {
  outline: none;
  border-color: #667eea;
}

@media (max-width: 600px) {
  .container {
    padding: 20px;
  }

  h1 {
    font-size: 1.5em;
  }

  .input-container {
    flex-direction: column;
  }

  .stats {
    flex-direction: column;
    gap: 10px;
  }

  .todo-actions {
    flex-direction: column;
  }

  .edit-btn, .delete-btn {
    padding: 4px 8px;
    font-size: 0.75em;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>📝 My To-Do List</h1>

  <div class="input-container">
    <input 
      type="text" 
      id="todoInput" 
      placeholder="Add a new task..."
      autocomplete="off"
    >
    <select id="prioritySelect" class="priority-selector">
      <option value="low">Low</option>
      <option value="medium" selected>Normal</option>
      <option value="high">High</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <ul id="todoList"></ul>

  <div id="emptyState" class="empty-state" style="display: none;">
    <div class="empty-state-icon">✨</div>
    <p>No tasks yet. Add one to get started!</p>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-number" id="totalCount">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-number" id="activeCount">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat">
      <span class="stat-number" id="completedCount">0</span>
      <span class="stat-label">Completed</span>
    </div>
  </div>

  <button id="clearBtn">Clear All Completed</button>
</div>

<script>
const todoInput = document.getElementById('todoInput');
const prioritySelect = document.getElementById('prioritySelect');
const addBtn = document.getElementById('addBtn');
const todoList = document.getElementById('todoList');
const emptyState = document.getElementById('emptyState');
const filterBtns = document.querySelectorAll('.filter-btn');
const clearBtn = document.getElementById('clearBtn');

let todos = [];
let currentFilter = 'all';
let editingId = null;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  loadTodos();
  renderTodos();
  updateStats();
});

// Add event listeners
addBtn.addEventListener('click', addTodo);
todoInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') addTodo();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    filterBtns.forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderTodos();
  });
});

clearBtn.addEventListener('click', clearCompleted);

// Functions
function addTodo() {
  const text = todoInput.value.trim();
  const priority = prioritySelect.value;

  if (text === '') {
    alert('Please enter a task!');
    return;
  }

  if (editingId !== null) {
    // Update existing todo
    const todo = todos.find(t => t.id === editingId);
    if (todo) {
      todo.text = text;
      todo.priority = priority;
      editingId = null;
      addBtn.textContent = 'Add';
    }
  } else {
    // Create new todo
    const newTodo = {
      id: Date.now(),
      text: text,
      completed: false,
      priority: priority,
      createdAt: new Date().toLocaleString()
    };
    todos.push(newTodo);
  }

  todoInput.value = '';
  prioritySelect.value = 'medium';
  saveTodos();
  renderTodos();
  updateStats();
  todoInput.focus();
}

function toggleTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (todo) {
    todo.completed = !todo.completed;
    saveTodos();
    renderTodos();
    updateStats();
  }
}

function deleteTodo(id) {
  if (confirm('Are you sure you want to delete this task?')) {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    renderTodos();
    updateStats();
  }
}

function editTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (todo) {
    todoInput.value = todo.text;
    prioritySelect.value = todo.priority;
    editingId = id;
    addBtn.textContent = 'Update';
    todoInput.focus();
  }
}

function clearCompleted() {
  if (confirm('Are you sure you want to delete all completed tasks?')) {
    todos = todos.filter(t => !t.completed);
    saveTodos();
    renderTodos();
    updateStats();
  }
}

function renderTodos() {
  todoList.innerHTML = '';

  let filteredTodos = todos;
  if (currentFilter === 'active') {
    filteredTodos = todos.filter(t => !t.completed);
  } else if (currentFilter === 'completed') {
    filteredTodos = todos.filter(t => t.completed);
  }

  if (filteredTodos.length === 0) {
    emptyState.style.display = 'block';
    todoList.style.display = 'none';
    return;
  }

  emptyState.style.display = 'none';
  todoList.style.display = 'block';

  filteredTodos.forEach(todo => {
    const li = document.createElement('li');
    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
    li.innerHTML = `
      <input 
        type="checkbox" 
        class="checkbox" 
        ${todo.completed ? 'checked' : ''}
        onchange="toggleTodo(${todo.id})"
      >
      <span class="todo-text">${escapeHtml(todo.text)}</span>
      <span class="todo-priority priority-${todo.priority}">${todo.priority}</span>
      <div class="todo-actions">
        <button class="edit-btn" onclick="editTodo(${todo.id})">Edit</button>
        <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
      </div>
    `;
    todoList.appendChild(li);
  });
}

function updateStats() {
  const total = todos.length;
  const completed = todos.filter(t => t.completed).length;
  const active = total - completed;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('activeCount').textContent = active;
  document.getElementById('completedCount').textContent = completed;
}

function saveTodos() {
  localStorage.setItem('todos', JSON.stringify(todos));
}

function loadTodos() {
  const stored = localStorage.getItem('todos');
  todos = stored ? JSON.parse(stored) : [];
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

</body>
</html>
